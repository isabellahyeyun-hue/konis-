<body>
<div class="app">
  <header>
    <h1>손위생 관찰기록 PWA 시스템</h1>
    <p id="headerText" class="hidden">현재 월 기록을 불러오는 중입니다.</p>
  </header>
  <main class="content">
    <section class="panel active" data-tab="input">
      <div class="card">
        <div class="meta"></div>
        <form id="recordForm" novalidate style="flex:1;display:flex;flex-direction:column;gap:2px">
          <input type="hidden" id="editId">
          <div class="form-grid">
            <div class="field"><label for="observerInput">관찰자</label><input id="observerInput" class="readonly" type="text" value="정혜윤" readonly></div>
            <div class="field"><label for="dateInput">날짜</label><input id="dateInput" type="date" required></div>
            <div class="field"><label for="startInput">관찰 시작</label><input id="startInput" type="time" required></div>
            <div class="field"><label for="endInput">관찰 종료</label><input id="endInput" type="time" required></div>
            <div class="field"><label for="jobSelect">직종</label><select id="jobSelect" required></select></div>
            <div class="field"><label for="locationSelect">장소</label><select id="locationSelect" required></select></div>
          </div>
          <div class="field" style="margin-top:6px"><div class="label">행위</div><div class="choices moment" id="momentChoices"></div></div>
          <div class="field" style="margin-top:6px"><div class="label">수행</div><div class="choices three" id="actionChoices"></div></div>
          <div class="field" style="margin-top:6px"><div class="label">장갑</div><div class="choices two" id="gloveChoices"></div></div>
          <div class="row" style="margin-top:6px">
            <button class="primary" id="saveBtn" type="submit">저장</button>
            <button class="ghost hidden" id="cancelBtn" type="button">수정 취소</button>
          </div>
          <div class="msg info" id="formMsg"></div>
        </form>
      </div>
    </section>

    <section class="panel" data-tab="records">
      <div class="card">
        <h2>조회/수정</h2>
        <div class="grid2" style="margin-top:8px">
          <div class="field"><label for="recordsMonth">조회 월</label><input id="recordsMonth" type="month"></div>
          <div class="field"><label>요약</label><div class="empty" id="recordSummary">선택한 월 기록을 정리하는 중입니다.</div></div>
        </div>
      </div>
      <div class="records" id="recordList"></div>
    </section>

    <section class="panel" data-tab="stats">
      <div class="card">
        <h2>통계</h2>
        <div class="grid2" style="margin-top:8px">
          <div class="field"><label for="statsMonth">통계 월</label><input id="statsMonth" type="month"></div>
          <div class="field"><label>공식</label><div class="empty">(1 + 2) / 전체 × 100</div></div>
        </div>
      </div>
      <div class="grid4" id="summaryGrid"></div>
      <div class="card"><h3>트렌드</h3><div class="chart" id="trendChart"></div></div>
      <div class="stats2">
        <div class="card"><h3>직종별</h3><div class="chart" id="jobChart"></div><div class="table" id="jobTable"></div></div>
        <div class="card"><h3>장소별</h3><div class="chart" id="locationChart"></div><div class="table" id="locationTable"></div></div>
      </div>
      <div class="card"><h3>행위별</h3><div class="chart" id="momentChart"></div><div class="table" id="momentTable"></div></div>
    </section>

    <section class="panel" data-tab="settings">
      <div class="card">
        <h2>설정</h2>
        <div class="grid2" style="margin-top:8px">
          <div class="field"><label for="settingsMonth">출력 월</label><input id="settingsMonth" type="month"></div>
          <div class="field"><label for="backupUrl">Google Apps Script URL</label><input id="backupUrl" type="url" placeholder="https://script.google.com/macros/s/.../exec"></div>
        </div>
        <div class="row" style="margin-top:16px">
          <button class="secondary" id="settingsBtn" type="button">설정 저장</button>
          <button class="ghost" id="backupBtn" type="button">Google 백업 실행</button>
        </div>
      </div>
      <div class="card">
        <h3>출력</h3>
        <div class="row">
          <button class="primary" id="excelBtn" type="button">KONIS 엑셀</button>
          <button class="secondary" id="pdfBtn" type="button">PDF</button>
          <button class="ghost" id="zipBtn" type="button">ZIP</button>
          <button class="ghost" id="jsonOutBtn" type="button">JSON 내보내기</button>
          <button class="ghost" id="jsonInBtn" type="button">JSON 가져오기</button>
        </div>
        <input class="hidden" id="jsonFile" type="file" accept="application/json,.json">
      </div>
      <div class="card"><h3>상태</h3><div class="empty" id="statusBox">앱을 준비하는 중입니다.</div></div>
    </section>
  </main>
  <nav aria-label="Bottom Navigation">
    <button class="active" data-tab-btn="input" type="button">입력</button>
    <button data-tab-btn="records" type="button">조회/수정</button>
    <button data-tab-btn="stats" type="button">통계</button>
    <button data-tab-btn="settings" type="button">설정</button>
  </nav>
</div>

const D = {};
const S = {
  db: null,
  records: [],
  settings: { month: monthNow(), backupUrl: DEFAULT_BACKUP_URL },
  deviceId: "",
  editId: "",
  prepared: null,
  stamp: 0,
  busy: new Set()
};

document.addEventListener("DOMContentLoaded", () => { void init(); });

async function init() {
  cacheDom();
  fillSelect(D.jobSelect, JOBS, "직종 선택");
  fillSelect(D.locationSelect, LOCS, "장소 선택");
  fillChoices(D.momentChoices, "moment", MOMENTS);
  fillChoices(D.actionChoices, "action", ACTIONS);
  fillChoices(D.gloveChoices, "glove", GLOVES);
  setCheckedValue("glove", "2");
  bindEvents();

  try {
    S.db = await openDb();
    const loaded = await loadDbState();
    S.records = sortRecords(loaded.records, true);
    S.settings = loaded.settings;
    S.deviceId = loaded.deviceId;
    S.stamp = Date.now();
  } catch (error) {
    disableInteractiveUi();
    status("IndexedDB 초기화 실패: " + errorMessage(error), "error");
    return;
  }

  hydrateControls();
  render();
  registerSW();
  status("IndexedDB를 기준으로 로컬 데이터를 불러왔습니다.", "info");
}

function cacheDom() {
  ["headerText","recordForm","editId","dateInput","observerInput","startInput","endInput","jobSelect","locationSelect","momentChoices","actionChoices","gloveChoices","saveBtn","cancelBtn","formMsg","recordsMonth","recordSummary","recordList","statsMonth","summaryGrid","trendChart","jobChart","locationChart","momentChart","jobTable","locationTable","momentTable","settingsMonth","backupUrl","settingsBtn","backupBtn","excelBtn","pdfBtn","zipBtn","jsonOutBtn","jsonInBtn","jsonFile","statusBox"].forEach((id) => { D[id] = document.getElementById(id); });
  D.panels = Array.from(document.querySelectorAll(".panel"));
  D.tabs = Array.from(document.querySelectorAll("[data-tab-btn]"));
  D.lockButtons = [D.saveBtn, D.cancelBtn, D.settingsBtn, D.backupBtn, D.excelBtn, D.pdfBtn, D.zipBtn, D.jsonOutBtn, D.jsonInBtn];
}

function bindEvents() {
  D.recordForm.addEventListener("submit", (event) => {
    event.preventDefault();
    void runLocked("save", D.saveBtn, async () => { await handleSubmit(); });
  });
  D.cancelBtn.addEventListener("click", () => resetForm());
  D.settingsBtn.addEventListener("click", () => { void runLocked("settings", D.settingsBtn, async () => { await persistSettingsFromUi(true); }); });
  D.backupBtn.addEventListener("click", () => { void runLocked("backup", D.backupBtn, async () => { await persistSettingsFromUi(false); const result = await googleBackup("manual"); status(result.message, result.ok ? "success" : "warning"); }); });
  D.jsonOutBtn.addEventListener("click", () => { void runLocked("json-export", D.jsonOutBtn, async () => { exportJson(); }); });
  D.jsonInBtn.addEventListener("click", () => D.jsonFile.click());
  D.jsonFile.addEventListener("change", () => { void runLocked("json-import", D.jsonInBtn, async () => { await importJson(); }); });
  [D.startInput, D.endInput].forEach((input) => {
    input.addEventListener("focus", () => {
      const now = new Date();
      input.value = now.toISOString().slice(11, 16);
    });
    input.addEventListener("click", () => {
      const now = new Date();
      input.value = now.toISOString().slice(11, 16);
    });
  });
  D.excelBtn.addEventListener("click", () => { void runLocked("excel", D.excelBtn, async () => { await exportExcel(); }); });
  D.pdfBtn.addEventListener("click", () => { void runLocked("pdf", D.pdfBtn, async () => { await exportPdf(); }); });
  D.zipBtn.addEventListener("click", () => { void runLocked("zip", D.zipBtn, async () => { await exportZip(); }); });
  [D.recordsMonth, D.statsMonth, D.settingsMonth].forEach((input) => input.addEventListener("change", async (event) => { await handleMonthChange(event.target.value || monthNow()); }));
  D.tabs.forEach((button) => button.addEventListener("click", () => switchTab(button.dataset.tabBtn)));
}

async function runLocked(key, button, job) {
  if (S.busy.has(key)) return;
  S.busy.add(key);
  if (button) button.disabled = true;
  try { await job(); } finally { if (button) button.disabled = false; S.busy.delete(key); }
}

function fillSelect(select, items, placeholder) {
  select.innerHTML = "";
  const empty = document.createElement("option");
  empty.value = "";
  empty.textContent = placeholder;
  select.appendChild(empty);
  items.forEach((item) => {
    const option = document.createElement("option");
    option.value = packPair(item);
    option.textContent = item.label + " (" + item.code + ")";
    select.appendChild(option);
  });
}

function fillChoices(container, name, items) {
  container.innerHTML = "";
  items.forEach((item) => {
    const label = document.createElement("label");
    label.className = "choice";
    label.innerHTML = '<input type="radio" name="' + name + '" value="' + item.code + '"><span>' + escapeHtml(item.label) + "</span>";
    container.appendChild(label);
  });
}

async function loadDbState() {
  const [records, settingsEntry, deviceEntry] = await Promise.all([readAllRecords(), readMeta(META_KEYS.settings), readMeta(META_KEYS.deviceId)]);
  const normalized = [];
  for (const record of records) {
    const valid = normalizeRecord(record);
    if (!valid) throw new Error("IndexedDB 내부 기록 구조가 유효하지 않습니다.");
    normalized.push(valid);
  }
  const settings = normalizeSettings(settingsEntry && settingsEntry.value ? settingsEntry.value : null);
  let deviceId = deviceEntry && typeof deviceEntry.value === "string" && deviceEntry.value ? deviceEntry.value : "";
  if (!deviceId) {
    deviceId = createUuid();
    await writeMeta(META_KEYS.deviceId, deviceId);
  }
  if (!settingsEntry) await writeMeta(META_KEYS.settings, settings);
  return { records: normalized, settings, deviceId };
}

function normalizeSettings(value) {
  return {
    month: value && typeof value.month === "string" && /^\d{4}-\d{2}$/.test(value.month) ? value.month : monthNow(),
    backupUrl: value && typeof value.backupUrl === "string" && value.backupUrl ? value.backupUrl : DEFAULT_BACKUP_URL
  };
}

function hydrateControls() {
  D.recordsMonth.value = S.settings.month;
  D.statsMonth.value = S.settings.month;
  D.settingsMonth.value = S.settings.month;
  D.backupUrl.value = S.settings.backupUrl;
  resetForm();
}

async function handleMonthChange(value) {
  S.settings.month = value;
  D.recordsMonth.value = value;
  D.statsMonth.value = value;
  D.settingsMonth.value = value;
  await persistSettingsFromUi(false);
  render();
}

async function persistSettingsFromUi(showMessage) {
  const next = { month: D.settingsMonth.value || monthNow(), backupUrl: D.backupUrl.value.trim() };
  S.settings = normalizeSettings(next);
  D.recordsMonth.value = S.settings.month;
  D.statsMonth.value = S.settings.month;
  D.settingsMonth.value = S.settings.month;
  D.backupUrl.value = S.settings.backupUrl;
  await writeMeta(META_KEYS.settings, S.settings);
  if (showMessage) status("설정을 저장했습니다.", "success");
}

async function handleSubmit() {
  clearFormMessage();
  const editing = Boolean(S.editId);
  D.saveBtn.textContent = editing ? "수정 중..." : "저장 중...";
  const draft = buildDraftRecord();
  const validationError = validateRecord(draft);
  if (validationError) {
    formMessage(validationError, "error");
    D.saveBtn.textContent = editing ? "수정 저장" : "저장";
    return;
  }
  try {
    await saveRecord(draft);
    await reloadRecords();
  } catch (error) {
    formMessage("저장 실패: " + errorMessage(error), "error");
    D.saveBtn.textContent = editing ? "수정 저장" : "저장";
    return;
  }
  try {
    render();
  } catch (error) {
    status("통계 갱신 실패: " + errorMessage(error), "error");
    D.saveBtn.textContent = editing ? "수정 저장" : "저장";
    return;
  }
  const backupResult = await googleBackup("save");
  // 저장 후 값 유지: 날짜, 시작 시간, 종료 시간, 직종, 장소
  // 초기화: 행위, 수행 여부, 장갑
  clearCheckedValue("moment");
  clearCheckedValue("action");
  clearCheckedValue("glove");
  D.saveBtn.textContent = "저장";
  D.cancelBtn.classList.add("hidden");
  clearFormMessage();
  formMessage(editing ? "수정이 완료되었습니다." : "저장이 완료되었습니다.", "success");
  if (!backupResult.ok) {
    status(backupResult.message, "warning");
    return;
  }
  try {
    await prepareBundle();
    status(monthLabel(selectedMonth()) + " 출력 파일 준비를 완료했습니다.", "success");
  } catch (error) {
    status("파일 준비 실패: " + errorMessage(error), "warning");
  }
}

function buildDraftRecord() {
  const existing = S.editId ? S.records.find((record) => record.id === S.editId) : null;
  const job = unpackPair(D.jobSelect.value);
  const location = unpackPair(D.locationSelect.value);
  return {
    id: existing ? existing.id : createUuid(),
    date: D.dateInput.value.replaceAll("-", ""),
    startTime: D.startInput.value,
    endTime: D.endInput.value,
    observer: OBSERVER,
    job: { code: String(job.code || ""), label: String(job.label || "") },
    location: { code: String(location.code || ""), label: String(location.label || "") },
    moment: checkedValue("moment"),
    action: checkedValue("action"),
    glove: checkedValue("glove"),
    createdAt: existing ? existing.createdAt : Date.now()
  };
}

function validateRecord(record) {
  if (!normalizeRecord(record)) return "저장 데이터 구조가 유효하지 않습니다.";
  if (!/^\d{8}$/.test(record.date)) return "날짜 형식은 YYYYMMDD 이어야 합니다.";
  if (!/^\d{2}:\d{2}$/.test(record.startTime)) return "시간 형식은 HH:mm 이어야 합니다.";
  if (!ACTION_SET.has(record.action)) return "수행값은 1, 2, 3 중 하나여야 합니다.";
  if (!GLOVE_SET.has(record.glove)) return "장갑값은 1 또는 2만 허용됩니다.";
  if (!JOB_MAP.has(record.job.code + "|" + record.job.label)) return "정의된 직종만 저장할 수 있습니다.";
  if (!LOC_MAP.has(record.location.code + "|" + record.location.label)) return "정의된 장소만 저장할 수 있습니다.";
  if (!MOMENT_SET.has(record.moment)) return "정의된 행위만 저장할 수 있습니다.";
  return "";
}

function render() {
  D.headerText.textContent = monthLabel(selectedMonth()) + " · 기록 " + filteredRecords().length + "건";
  renderRecords();
  renderStats();
}

function renderRecords() {
  const records = sortRecords(filteredRecords(), false);
  const performedCount = records.filter(isPerformed).length;
  D.recordSummary.textContent = "총 " + records.length + "건 / 수행 " + performedCount + "건 / 수행률 " + safeRate(records).toFixed(1) + "%";
  if (!records.length) {
    D.recordList.innerHTML = '<div class="empty">선택한 월의 기록이 없습니다.</div>';
    return;
  }
  D.recordList.innerHTML = records.map((record) => {
    const action = ACTIONS.find((item) => item.code === record.action);
    const moment = MOMENTS.find((item) => item.code === record.moment);
    return '<div class="record"><div><strong>' + escapeHtml(formatDate(record.date)) + " " + escapeHtml(record.startTime) + " - " + escapeHtml(record.endTime) + "</strong><p>" + escapeHtml(record.job.label) + " · " + escapeHtml(record.location.label) + " · " + escapeHtml(moment ? moment.label : "") + " · " + escapeHtml(action ? action.label : "") + '</p></div><div class="actions"><button class="secondary" data-edit="' + escapeHtml(record.id) + '" type="button">수정</button><button class="danger" data-delete="' + escapeHtml(record.id) + '" type="button">삭제</button></div></div>';
  }).join("");
  Array.from(D.recordList.querySelectorAll("[data-edit]")).forEach((button) => button.addEventListener("click", () => startEdit(button.dataset.edit)));
  Array.from(D.recordList.querySelectorAll("[data-delete]")).forEach((button) => button.addEventListener("click", () => { void runLocked("delete:" + button.dataset.delete, null, async () => { await deleteRecord(button.dataset.delete); }); }));
}

function renderStats() {
  const stats = buildStats(filteredRecords());
  D.summaryGrid.innerHTML = [["전체 수행률", safeNumber(stats.rate).toFixed(1) + "%"],["전체 건수", String(stats.total)],["수행 건수", String(stats.performed)],["미수행 건수", String(Math.max(0, stats.total - stats.performed))]].map(([label, value]) => '<div class="summary"><span>' + escapeHtml(label) + "</span><b>" + escapeHtml(value) + "</b></div>").join("");
  D.trendChart.innerHTML = buildTrendSvg(stats.trend, 760, 280);
  D.jobChart.innerHTML = buildBarSvg(stats.jobs, 760, 280, "직종별 수행률");
  D.locationChart.innerHTML = buildBarSvg(stats.locations, 760, 320, "장소별 수행률");
  D.momentChart.innerHTML = buildBarSvg(stats.moments, 760, 300, "행위별 수행률");
  D.jobTable.innerHTML = buildRateTable(stats.jobs);
  D.locationTable.innerHTML = buildRateTable(stats.locations);
  D.momentTable.innerHTML = buildRateTable(stats.moments);
}

function buildStats(records) {
  const total = records.length;
  const performed = records.filter(isPerformed).length;
  const buildGroup = (items, matcher) => items.map((item) => {
    const own = records.filter((record) => matcher(record, item));
    return { label: item.label, pdf: item.pdf, total: own.length, performed: own.filter(isPerformed).length, rate: safeRate(own) };
  });
  const jobs = buildGroup(JOBS, (record, item) => record.job.code === item.code && record.job.label === item.label);
  const locations = buildGroup(LOCS, (record, item) => record.location.code === item.code && record.location.label === item.label);
  const moments = buildGroup(MOMENTS, (record, item) => record.moment === item.code);
  const dailyMap = new Map();
  sortRecords(records, true).forEach((record) => {
    if (!dailyMap.has(record.date)) dailyMap.set(record.date, []);
    dailyMap.get(record.date).push(record);
  });
  const trend = Array.from(dailyMap.entries()).map(([date, items]) => ({ date, label: formatDate(date).slice(5), total: items.length, performed: items.filter(isPerformed).length, rate: safeRate(items) }));
  return { total, performed, rate: safeRate(records), jobs, locations, moments, trend };
}

function buildRateTable(items) {
  return "<table><thead><tr><th>구분</th><th>전체</th><th>수행</th><th>수행률</th></tr></thead><tbody>" + items.map((item) => "<tr><td>" + escapeHtml(item.label) + "</td><td>" + item.total + "</td><td>" + item.performed + '</td><td class="rate">' + safeNumber(item.rate).toFixed(1) + "%</td></tr>").join("") + "</tbody></table>";
}

function buildBarSvg(items, width, height, title) {
  const safeItems = items.length ? items : [{ label: "데이터 없음", total: 0, performed: 0, rate: 0 }];
  const labelWidth = 180;
  const chartWidth = width - labelWidth - 120;
  const rowHeight = Math.max(44, Math.floor((height - 56) / safeItems.length));
  const svgHeight = Math.max(height, safeItems.length * rowHeight + 64);
  const ticks = [0,25,50,75,100].map((tick) => '<text x="' + (labelWidth + chartWidth * tick / 100) + '" y="28" font-size="12" fill="#5d7982" text-anchor="middle">' + tick + "%</text>").join("");
  const bars = safeItems.map((item, index) => {
    const y = 44 + index * rowHeight;
    const barWidth = safeNumber(item.rate) * chartWidth / 100;
    return '<text x="20" y="' + (y + 18) + '" font-size="14" fill="#18353a">' + escapeHtml(item.label) + '</text><text x="' + (width - 20) + '" y="' + (y + 18) + '" font-size="13" fill="#0b5a54" text-anchor="end">' + safeNumber(item.rate).toFixed(1) + '%</text><rect x="' + labelWidth + '" y="' + y + '" rx="10" ry="10" width="' + chartWidth + '" height="18" fill="#e8f1f1"></rect><rect x="' + labelWidth + '" y="' + y + '" rx="10" ry="10" width="' + Math.max(barWidth, item.total ? 6 : 0) + '" height="18" fill="#0f766e"></rect>';
  }).join("");
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + width + " " + svgHeight + '"><rect width="100%" height="100%" fill="#fff"></rect><text x="20" y="24" font-size="16" font-weight="700" fill="#18353a">' + escapeHtml(title) + "</text>" + ticks + bars + "</svg>";
}

function buildTrendSvg(items, width, height) {
  if (!items.length) return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + width + " " + height + '"><rect width="100%" height="100%" fill="#fff"></rect><text x="' + (width / 2) + '" y="' + (height / 2) + '" font-size="16" fill="#5d7982" text-anchor="middle">데이터가 없습니다.</text></svg>';
  const left = 56, right = width - 20, top = 26, bottom = height - 42, innerWidth = right - left, innerHeight = bottom - top;
  const points = items.map((item, index) => ({ x: items.length === 1 ? left + innerWidth / 2 : left + innerWidth * index / (items.length - 1), y: bottom - safeNumber(item.rate) / 100 * innerHeight, label: item.label, rate: safeNumber(item.rate) }));
  const grid = [0,25,50,75,100].map((tick) => { const y = bottom - tick / 100 * innerHeight; return '<line x1="' + left + '" y1="' + y + '" x2="' + right + '" y2="' + y + '" stroke="#e3ecef" stroke-width="1"></line><text x="' + (left - 10) + '" y="' + (y + 4) + '" font-size="12" fill="#5d7982" text-anchor="end">' + tick + "%</text>"; }).join("");
  const labels = points.map((point) => '<text x="' + point.x + '" y="' + (bottom + 20) + '" font-size="12" fill="#5d7982" text-anchor="middle">' + escapeHtml(point.label) + "</text>").join("");
  const path = points.map((point, index) => (index ? "L" : "M") + point.x + " " + point.y).join(" ");
  const dots = points.map((point) => '<circle cx="' + point.x + '" cy="' + point.y + '" r="4.5" fill="#0f766e"></circle><text x="' + point.x + '" y="' + (point.y - 10) + '" font-size="12" fill="#0b5a54" text-anchor="middle">' + point.rate.toFixed(1) + "%</text>").join("");
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + width + " " + height + '"><rect width="100%" height="100%" fill="#fff"></rect><text x="20" y="22" font-size="16" font-weight="700" fill="#18353a">일자별 수행률 추이</text>' + grid + '<path d="' + path + '" fill="none" stroke="#0f766e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"></path>' + dots + labels + "</svg>";
}

function startEdit(id) {
  const record = S.records.find((item) => item.id === id);
  if (!record) return;
  S.editId = record.id;
  D.editId.value = record.id;
  D.dateInput.value = record.date.slice(0, 4) + "-" + record.date.slice(4, 6) + "-" + record.date.slice(6, 8);
  D.startInput.value = record.startTime;
  D.endInput.value = record.endTime;
  D.observerInput.value = record.observer;
  D.jobSelect.value = packPair(record.job);
  D.locationSelect.value = packPair(record.location);
  setCheckedValue("moment", record.moment);
  setCheckedValue("action", record.action);
  setCheckedValue("glove", record.glove);
  D.saveBtn.textContent = "수정 저장";
  D.cancelBtn.classList.remove("hidden");
  switchTab("input");
  formMessage("수정 모드로 전환했습니다.", "info");
}

async function deleteRecord(id) {
  const record = S.records.find((item) => item.id === id);
  if (!record) return;
  if (!window.confirm("선택한 기록을 삭제하시겠습니까?")) return;
  await deleteRecordById(id);
  await reloadRecords();
  render();
  if (S.editId === id) resetForm();
  try {
    await prepareBundle();
  } catch (error) {
    status("삭제 후 파일 준비 실패: " + errorMessage(error), "warning");
    return;
  }
  status("기록을 삭제했습니다.", "success");
}

function resetForm() {
  S.editId = "";
  D.editId.value = "";
  D.recordForm.reset();
  D.dateInput.value = todayValue();
  D.observerInput.value = OBSERVER;
  D.jobSelect.value = "";
  D.locationSelect.value = "";
  clearCheckedValue("moment");
  clearCheckedValue("action");
  clearCheckedValue("glove");
  setCheckedValue("glove", "2");
  D.saveBtn.textContent = "저장";
  D.cancelBtn.classList.add("hidden");
  clearFormMessage();
}

async function importJson() {
  const file = D.jsonFile.files && D.jsonFile.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = safeParse(text, null);
    if (!Array.isArray(parsed)) throw new Error("JSON 배열 형식이 아닙니다.");
    const normalized = parsed.map((item, index) => {
      const record = normalizeRecord(item);
      if (!record) throw new Error("JSON " + (index + 1) + "번째 기록이 유효하지 않습니다.");
      return record;
    });
    await replaceAllRecords(normalized);
    await reloadRecords();
    render();
    await prepareBundle();
    status("JSON 가져오기가 완료되었습니다. 유효 기록 " + normalized.length + "건을 반영했습니다.", "success");
  } catch (error) {
    status("JSON 가져오기 실패: " + errorMessage(error), "error");
  } finally {
    D.jsonFile.value = "";
  }
}

function exportJson() {
  const jsonText = JSON.stringify(sortRecords(S.records, true), null, 2);
  downloadBlob(new Blob([jsonText], { type: "application/json" }), "HANDHYGIENE_BACKUP_" + todayValue().replaceAll("-", "") + ".json");
  status("JSON 백업을 내보냈습니다.", "success");
}

async function googleBackup(source) {
  const url = (S.settings.backupUrl || "").trim();
  if (!url) return { ok: false, message: "Google Apps Script URL이 비어 있어 백업을 건너뛰었습니다." };
  try {
    const response = await fetch(url, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ deviceId: S.deviceId, timestamp: Date.now(), data: sortRecords(S.records, true) }),
      cache: "no-store"
    });
    const json = await response.json().catch(() => null);
    if (!response.ok || !json || json.status !== "ok") return { ok: false, message: (source === "save" ? "자동" : "수동") + " Google 백업 응답이 올바르지 않습니다." };
    return { ok: true, message: (source === "save" ? "자동" : "수동") + " Google 백업을 완료했습니다." };
  } catch (error) {
    return { ok: false, message: (source === "save" ? "자동" : "수동") + " Google 백업 실패: " + errorMessage(error) };
  }
}

async function prepareBundle() {
  S.prepared = await buildPreparedBundle(selectedMonth());
  return S.prepared;
}

async function ensurePreparedBundle() {
  const month = selectedMonth();
  if (S.prepared && S.prepared.month === month && S.prepared.stamp === S.stamp) return S.prepared;
  S.prepared = await buildPreparedBundle(month);
  return S.prepared;
}

async function buildPreparedBundle(month) {
  const records = sortRecords(filteredRecords(month), true);
  return { month, stamp: S.stamp, xlsx: buildWorkbook(records), pdf: buildPdf(records, month), jsonText: JSON.stringify(records, null, 2) };
}

function buildWorkbook(records) {
  const sheet = buildKonisSheetBundle(records);
  const files = [
    { name: "[Content_Types].xml", data: base64ToBytes(KONIS_CONTENT_TYPES_B64) },
    { name: "_rels/.rels", data: base64ToBytes(KONIS_ROOT_RELS_B64) },
    { name: "docProps/app.xml", data: encodeUtf8(buildKonisAppXml()) },
    { name: "docProps/core.xml", data: encodeUtf8(buildKonisCoreXml()) },
    { name: "xl/workbook.xml", data: encodeUtf8(buildKonisWorkbookXml(sheet.lastRow)) },
    { name: "xl/_rels/workbook.xml.rels", data: base64ToBytes(KONIS_WORKBOOK_RELS_B64) },
    { name: "xl/styles.xml", data: base64ToBytes(KONIS_STYLES_B64) },
    { name: "xl/theme/theme1.xml", data: base64ToBytes(KONIS_THEME_B64) },
    { name: "xl/sharedStrings.xml", data: encodeUtf8(buildKonisSharedStringsXml(sheet.state)) },
    { name: "xl/worksheets/sheet1.xml", data: encodeUtf8(sheet.sheetXml) },
    { name: "xl/worksheets/_rels/sheet1.xml.rels", data: base64ToBytes(KONIS_SHEET_RELS_B64) },
    { name: "xl/printerSettings/printerSettings1.bin", data: base64ToBytes(KONIS_PRINTER_SETTINGS_B64) }
  ];
  return buildZip(files).buffer.slice(0);
}

function buildKonisSheetBundle(records) {
  const state = createKonisSharedState();
  const lastRow = records.length + 2;
  const range = "A2:AB" + lastRow;
  const rows = records.map((record, index) => buildKonisExportRow(record, index));
  validateKonisExportRows(KONIS_HEADERS, rows, records.length);
  const body = decodeBase64Text(KONIS_ROW1_B64) + decodeBase64Text(KONIS_ROW2_B64) + rows.map((row, index) => buildKonisRowXml(row, index + 3, state)).join("");
  const prefix = decodeBase64Text(KONIS_SHEET_PREFIX_B64).replace("A1:AB106", "A1:AB" + lastRow);
  const suffix = decodeBase64Text(KONIS_SHEET_SUFFIX_B64).replace("A2:AB106", range);
  return { lastRow, state, sheetXml: prefix + body + suffix };
}

function createKonisSharedState() {
  const strings = KONIS_BASE_SHARED_STRINGS_B64.map(decodeBase64Text);
  const lookup = new Map();
  strings.forEach((value, index) => { if (!lookup.has(value)) lookup.set(value, index); });
  return { strings, lookup, count: 55 };
}

function ensureKonisSharedString(state, value) {
  const text = String(value || "");
  if (state.lookup.has(text)) return state.lookup.get(text);
  const index = state.strings.length;
  state.strings.push(text);
  state.lookup.set(text, index);
  return index;
}

function buildKonisExportRow(record, index) {
  if (!record || !record.job || !record.location) throw new Error("KONIS export \uB370\uC774\uD130 \uAD6C\uC870\uAC00 \uC720\uD6A8\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.");
  if (!record.job.code || !record.job.label) throw new Error("KONIS export \uC2E4\uD328: job.code / job.label \uB458 \uB2E4 \uD544\uC218\uC785\uB2C8\uB2E4.");
  if (!record.location.code || !record.location.label) throw new Error("KONIS export \uC2E4\uD328: location.code / location.label \uB458 \uB2E4 \uD544\uC218\uC785\uB2C8\uB2E4.");
  const row = new Array(KONIS_HEADERS.length).fill("");
  const start = record.startTime.split(":");
  const end = record.endTime.split(":");
  const momentIndex = MOMENTS.findIndex((item) => item.code === record.moment);
  row[0] = "";
  row[1] = "";
  row[2] = "1";
  row[3] = KONIS_OBSERVER_CODE;
  row[4] = String(record.date);
  row[5] = formatKonisTimePart(start[0]);
  row[6] = formatKonisTimePart(start[1]);
  row[7] = formatKonisTimePart(end[0]);
  row[8] = formatKonisTimePart(end[1]);
  row[9] = "";
  row[10] = "";
  row[11] = String(record.job.code);
  row[12] = record.job.code === "39" ? String(record.job.label) : "";
  row[13] = String(record.location.code);
  row[14] = String(record.location.label);
  if (momentIndex >= 0) row[15 + momentIndex] = "1";
  row[25] = konisActionValue(record.action);
  row[26] = String(record.glove);
  row[27] = "1";
  return row.map(normalizeKonisCell);
}

function validateKonisExportRows(headers, rows, recordCount) {
  if (!Array.isArray(headers) || headers.length !== 28) throw new Error("KONIS export \uC2E4\uD328: \uACE0\uC815 \uD5E4\uB354 \uAD6C\uC870\uAC00 \uC798\uBABB\uB418\uC5C8\uC2B5\uB2C8\uB2E4.");
  if (rows.length !== recordCount) throw new Error("KONIS export \uC2E4\uD328: row \uC218\uAC00 \uC6D0\uBCF8 record \uC218\uC640 \uC77C\uCE58\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.");
  rows.forEach((row, rowIndex) => {
    if (!Array.isArray(row)) throw new Error("KONIS export \uC2E4\uD328: row \uAD6C\uC870\uAC00 \uC720\uD6A8\uD558\uC9C0 \uC54A\uC2B5\uB2C8\uB2E4.");
    if (row.length !== headers.length) throw new Error("KONIS export \uC2E4\uD328: \uD5E4\uB354 \uAE38\uC774\uC640 row \uCEEC\uB7FC \uAE38\uC774\uAC00 \uB2E4\uB985\uB2C8\uB2E4. row " + (rowIndex + 1));
    row.forEach((value, columnIndex) => {
      if (value === null || typeof value === "undefined") throw new Error("KONIS export \uC2E4\uD328: null/undefined \uAC12\uC774 \uC874\uC7AC\uD569\uB2C8\uB2E4. row " + (rowIndex + 1) + ", col " + (columnIndex + 1));
      if (typeof value !== "string") throw new Error("KONIS export \uC2E4\uD328: \uBAA8\uB4E0 \uAC12\uC740 \uBB38\uC790\uC5F4\uC774\uC5B4\uC57C \uD569\uB2C8\uB2E4. row " + (rowIndex + 1) + ", col " + (columnIndex + 1));
    });
  });
}

function buildKonisRowXml(row, rowNumber, state) {
  const cells = row.map((value, index) => {
    if (value === "") return "";
    return konisSharedCell(columnName(index + 1), rowNumber, ensureKonisSharedString(state, value), state);
  }).join("");
  return '<row r="' + rowNumber + '" spans="1:' + KONIS_HEADERS.length + '" x14ac:dyDescent="0.3">' + cells + "</row>";
}

function buildKonisSharedStringsXml(state) {
  const items = state.strings.map((value) => {
    const preserve = /^\s|\s$/.test(value) ? ' xml:space="preserve"' : "";
    return "<si><t" + preserve + ">" + xmlEscape(value) + "</t></si>";
  }).join("");
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><sst xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" count="' + state.count + '" uniqueCount="' + state.strings.length + '">' + items + "</sst>";
}

function buildKonisAppXml() {
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Properties xmlns="http://schemas.openxmlformats.org/officeDocument/2006/extended-properties" xmlns:vt="http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes"><Application>Microsoft Excel</Application><DocSecurity>0</DocSecurity><ScaleCrop>false</ScaleCrop><HeadingPairs><vt:vector size="2" baseType="variant"><vt:variant><vt:lpstr>\uC6CC\uD06C\uC2DC\uD2B8</vt:lpstr></vt:variant><vt:variant><vt:i4>1</vt:i4></vt:variant></vt:vector></HeadingPairs><TitlesOfParts><vt:vector size="1" baseType="lpstr"><vt:lpstr>Sheet1</vt:lpstr></vt:vector></TitlesOfParts><LinksUpToDate>false</LinksUpToDate><SharedDoc>false</SharedDoc><HyperlinksChanged>false</HyperlinksChanged><AppVersion>16.0300</AppVersion></Properties>';
}

function buildKonisCoreXml() {
  const stamp = new Date().toISOString();

  let y = 100;
  y = drawPdfTable(pageOne, "Summary", ["Metric", "Value"], [["Records", String(stats.total)],["Performed", String(stats.performed)],["Not performed", String(Math.max(0, stats.total - stats.performed))],["Compliance", safeNumber(stats.rate).toFixed(1) + "%"]], 40, y, [220, 160]);
  y = drawPdfTable(pageOne, "Job", ["Label", "Total", "Performed", "Rate"], stats.jobs.map((item) => [item.pdf, String(item.total), String(item.performed), safeNumber(item.rate).toFixed(1) + "%"]), 40, y, [190, 70, 90, 70]);

function drawPdfTable(commands, title, headers, rows, x, y, widths) {
  const rowHeight = 18, tableWidth = widths.reduce((sum, value) => sum + value, 0);
  commands.push(pdfText(x, y, 12, title, true));
  const top = y + 8, totalHeight = rowHeight * (rows.length + 1);
  commands.push(pdfFillRect(x, top, tableWidth, rowHeight, 0.85, 0.94, 0.93));
  commands.push(pdfRect(x, top, tableWidth, totalHeight));
  let offset = x;
  widths.forEach((width, index) => { if (index) commands.push(pdfLine(offset, top, offset, top + totalHeight)); offset += width; });
  for (let index = 1; index <= rows.length; index += 1) commands.push(pdfLine(x, top + rowHeight * index, x + tableWidth, top + rowHeight * index));
  let cursor = x + 6;
  headers.forEach((header, index) => { commands.push(pdfText(cursor, top + 13, 9, header, true)); cursor += widths[index]; });
  rows.forEach((row, rowIndex) => {
    let cellX = x + 6;
    row.forEach((value, columnIndex) => { commands.push(pdfText(cellX, top + rowHeight * (rowIndex + 1) + 13, 8, sanitizePdfText(value), false)); cellX += widths[columnIndex]; });
  });
  return top + totalHeight + 24;
}

function drawTrendChartPdf(commands, items, x, y, width, height) {
  commands.push(pdfText(x, y - 8, 12, "Daily Trend", true));
  commands.push(pdfRect(x, y, width, height));
  const chartX = x + 38, chartY = y + 18, chartWidth = width - 58, chartHeight = height - 42;
  [0,25,50,75,100].forEach((tick) => { const lineY = chartY + chartHeight - tick / 100 * chartHeight; commands.push(pdfLine(chartX, lineY, chartX + chartWidth, lineY, 0.8)); commands.push(pdfText(x, lineY + 4, 8, tick + "%", false)); });
  if (!items.length) { commands.push(pdfText(x + 180, y + 110, 11, "No data", false)); return; }
  const points = items.map((item, index) => ({ x: items.length === 1 ? chartX + chartWidth / 2 : chartX + chartWidth * index / (items.length - 1), y: chartY + chartHeight - safeNumber(item.rate) / 100 * chartHeight, label: sanitizePdfText(item.label), rate: safeNumber(item.rate) }));
  points.forEach((point, index) => {
    if (index) commands.push(pdfPathLine(points[index - 1].x, points[index - 1].y, point.x, point.y, 0.06, 0.46, 0.43, 1.8));
    commands.push(pdfFillRect(point.x - 2, point.y - 2, 4, 4, 0.06, 0.46, 0.43));
    commands.push(pdfText(point.x - 10, point.y - 8, 7, point.rate.toFixed(1), false));
    commands.push(pdfText(point.x - 10, chartY + chartHeight + 16, 7, point.label, false));
  });
}

function drawBarChartPdf(commands, items, x, y, width, height, title) {
  commands.push(pdfText(x, y - 8, 12, title, true));
  commands.push(pdfRect(x, y, width, height));
  const chartX = x + 90, chartY = y + 20, chartWidth = width - 120, rowHeight = Math.max(28, Math.floor((height - 36) / Math.max(items.length, 1)));
  [0,25,50,75,100].forEach((tick) => { const axisX = chartX + chartWidth * tick / 100; commands.push(pdfLine(axisX, chartY - 6, axisX, chartY + rowHeight * items.length, 0.9)); commands.push(pdfText(axisX - 6, y + height - 4, 7, tick + "%", false)); });
  if (!items.length) { commands.push(pdfText(x + 180, y + 110, 11, "No data", false)); return; }
  items.forEach((item, index) => {
    const top = chartY + index * rowHeight, barWidth = chartWidth * safeNumber(item.rate) / 100;
    commands.push(pdfText(x + 6, top + 12, 8, sanitizePdfText(item.pdf), false));
    commands.push(pdfFillRect(chartX, top, Math.max(barWidth, item.total ? 4 : 0), 12, 0.06, 0.46, 0.43));
    commands.push(pdfText(chartX + chartWidth + 6, top + 12, 8, safeNumber(item.rate).toFixed(1) + "%", false));
  });
}

function buildPdfBinary(pageStreams) {

  const fontBold = addObject("<< /Type /Font /Subtype /Type1 /BaseFont /Helvetica-Bold >>");
  const contentIds = pageStreams.map((stream) => addObject("<< /Length " + stream.length + " >>\nstream\n" + stream + "\nendstream"));
  objects.push("");
  const pagesId = objects.length;
  const pageIds = pageStreams.map((_, index) => addObject("<< /Type /Page /Parent " + pagesId + " 0 R /MediaBox [0 0 " + PDF_SIZE.width.toFixed(2) + " " + PDF_SIZE.height.toFixed(2) + "] /Resources << /Font << /F1 " + fontRegular + " 0 R /F2 " + fontBold + " 0 R >> >> /Contents " + contentIds[index] + " 0 R >>"));
  objects[pagesId - 1] = "<< /Type /Pages /Count " + pageIds.length + " /Kids [" + pageIds.map((id) => id + " 0 R").join(" ") + "] >>";
  const catalogId = addObject("<< /Type /Catalog /Pages " + pagesId + " 0 R >>");

  const offsets = [0];
  objects.forEach((object, index) => { offsets[index + 1] = pdf.length; pdf += (index + 1) + " 0 obj\n" + object + "\nendobj\n"; });

  offsets.slice(1).forEach((offset) => { pdf += String(offset).padStart(10, "0") + " 00000 n \n"; });
  pdf += "trailer\n<< /Size " + (objects.length + 1) + " /Root " + catalogId + " 0 R >>\nstartxref\n" + xrefStart + "\n%%EOF";
  return encodeUtf8(pdf).buffer.slice(0);
}

async function saveRecord(record) { const transaction = S.db.transaction(STORES.records, "readwrite"); transaction.objectStore(STORES.records).put(record); await transactionDone(transaction); S.prepared = null; S.stamp = Date.now(); }

async function reloadRecords() {
  const records = await readAllRecords(), normalized = [];
  for (const record of records) {
    const valid = normalizeRecord(record);
    if (!valid) throw new Error("IndexedDB 내부 기록 구조가 유효하지 않습니다.");
    normalized.push(valid);
  }
  S.records = sortRecords(normalized, true);
  S.prepared = null;
  S.stamp = Date.now();
}

function openDb() {
  return new Promise((resolve, reject) => {
    const request = window.indexedDB.open(DB_NAME, DB_VERSION);
    request.onupgradeneeded = () => {
      const db = request.result;
      if (!db.objectStoreNames.contains(STORES.records)) db.createObjectStore(STORES.records, { keyPath: "id" });
      if (!db.objectStoreNames.contains(STORES.meta)) db.createObjectStore(STORES.meta, { keyPath: "key" });
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error || new Error("IndexedDB를 열 수 없습니다."));
  });
}

function readAllRecords() { const transaction = S.db.transaction(STORES.records, "readonly"), request = transaction.objectStore(STORES.records).getAll(); return requestToPromise(request, transaction); }
function readMeta(key) { const transaction = S.db.transaction(STORES.meta, "readonly"), request = transaction.objectStore(STORES.meta).get(key); return requestToPromise(request, transaction); }
async function writeMeta(key, value) { const transaction = S.db.transaction(STORES.meta, "readwrite"); transaction.objectStore(STORES.meta).put({ key, value }); await transactionDone(transaction); }

function requestToPromise(request, transaction) {
  return new Promise((resolve, reject) => {
    request.onsuccess = async () => { try { await transactionDone(transaction); resolve(request.result); } catch (error) { reject(error); } };
    request.onerror = () => reject(request.error || new Error("IndexedDB 요청이 실패했습니다."));
  });

function transactionDone(transaction) {
  return new Promise((resolve, reject) => {
    transaction.oncomplete = () => resolve();
    transaction.onerror = () => reject(transaction.error || new Error("IndexedDB 트랜잭션이 실패했습니다."));
    transaction.onabort = () => reject(transaction.error || new Error("IndexedDB 트랜잭션이 중단되었습니다."));
  });

function normalizeRecord(value) {
  if (!hasExactKeys(value, RECORD_KEYS)) return null;
  if (!hasExactKeys(value.job, PAIR_KEYS) || !hasExactKeys(value.location, PAIR_KEYS)) return null;
  if (typeof value.id !== "string" || !value.id) return null;
  if (typeof value.date !== "string" || !/^\d{8}$/.test(value.date)) return null;
  if (typeof value.startTime !== "string" || !/^\d{2}:\d{2}$/.test(value.startTime)) return null;
  if (typeof value.endTime !== "string" || !/^\d{2}:\d{2}$/.test(value.endTime)) return null;
  if (value.observer !== OBSERVER) return null;
  if (typeof value.createdAt !== "number" || !Number.isFinite(value.createdAt)) return null;
  if (!JOB_MAP.has(value.job.code + "|" + value.job.label)) return null;
  if (!LOC_MAP.has(value.location.code + "|" + value.location.label)) return null;
  if (!ACTION_SET.has(value.action) || !GLOVE_SET.has(value.glove) || !MOMENT_SET.has(value.moment)) return null;
  return { id: value.id, date: value.date, startTime: value.startTime, endTime: value.endTime, observer: value.observer, job: { code: value.job.code, label: value.job.label }, location: { code: value.location.code, label: value.location.label }, moment: value.moment, action: value.action, glove: value.glove, createdAt: value.createdAt };

function downloadBlob(blob, filename) { const url = URL.createObjectURL(blob), link = document.createElement("a"); link.href = url; link.download = filename; document.body.appendChild(link); link.click(); link.remove(); setTimeout(() => URL.revokeObjectURL(url), 1000); }
function disableInteractiveUi() { D.lockButtons.forEach((button) => { button.disabled = true; }); D.jobSelect.disabled = true; D.locationSelect.disabled = true; D.dateInput.disabled = true; D.startInput.disabled = true; D.endInput.disabled = true; }
function registerSW() { if (!("serviceWorker" in navigator)) return; const secureContext = window.location.protocol === "https:" || window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1"; if (!secureContext) { status("PWA 설치와 오프라인 캐시는 HTTPS 또는 localhost 환경에서 동작합니다.", "warning"); return; } navigator.serviceWorker.register("./sw.js").catch(() => { status("서비스 워커 등록을 완료하지 못했습니다.", "warning"); }); }
